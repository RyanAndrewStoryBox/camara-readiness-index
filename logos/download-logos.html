<!DOCTYPE html>
<html>
<head><title>Download CAMARA Provider Logos</title>
<style>
body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
h1 { color: #1a1a2e; }
.logo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
.logo-card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; text-align: center; }
.logo-card img { max-width: 150px; max-height: 80px; margin-bottom: 8px; }
.logo-card a { display: block; margin-top: 8px; color: #0066ff; }
button { background: #0066ff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; }
button:hover { background: #0052cc; }
.status { margin-top: 20px; padding: 12px; background: #f0f0f0; border-radius: 6px; }
</style>
</head>
<body>
<h1>CAMARA Provider Logo Downloader</h1>
<p>Click the button below to download all provider logos from Wikipedia. Each will be saved as a PNG file.</p>
<button onclick="downloadAll()">Download All Logos</button>
<div class="status" id="status">Ready to download.</div>

<div class="logo-grid" id="grid"></div>

<script>
const logos = {
  'telefonica.png': 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Telef%C3%B3nica_2021_logo.svg/500px-Telef%C3%B3nica_2021_logo.svg.png',
  'deutsche-telekom.png': 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Deutsche_Telekom_2022.svg/500px-Deutsche_Telekom_2022.svg.png',
  'orange.png': 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Orange_logo.svg/500px-Orange_logo.svg.png',
  'vodafone.png': 'https://upload.wikimedia.org/wikipedia/en/thumb/c/cc/Vodafone_2017_logo.svg/500px-Vodafone_2017_logo.svg.png',
  'bt.png': 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/17/BT_Group_2022.svg/500px-BT_Group_2022.svg.png',
  'nokia.png': 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Nokia_2023.svg/500px-Nokia_2023.svg.png',
  'infobip.png': 'https://upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Infobip_logo_horizontal_orange.png/500px-Infobip_logo_horizontal_orange.png',
  'telia.png': 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/Telia_Company_logo_2022.svg/500px-Telia_Company_logo_2022.svg.png',
  'telstra.png': 'https://upload.wikimedia.org/wikipedia/en/thumb/c/c1/Telstra_logo.svg/500px-Telstra_logo.svg.png',
  'proximus.png': 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/aa/Proximus_logo1.png/500px-Proximus_logo1.png',
  'bridge-alliance.png': 'https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Bridge_Alliance_logo.svg/500px-Bridge_Alliance_logo.svg.png'
};

// Show preview grid
const grid = document.getElementById('grid');
for (const [name, url] of Object.entries(logos)) {
  const card = document.createElement('div');
  card.className = 'logo-card';
  card.innerHTML = `<img src="${url}" alt="${name}" crossorigin="anonymous"><br><strong>${name}</strong><a href="${url}" download="${name}">Direct link</a>`;
  grid.appendChild(card);
}

async function downloadOne(url, filename) {
  try {
    const resp = await fetch(url);
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    return true;
  } catch(e) {
    console.error(`Failed ${filename}:`, e);
    return false;
  }
}

async function downloadAll() {
  const status = document.getElementById('status');
  const entries = Object.entries(logos);
  let done = 0;
  for (const [name, url] of entries) {
    status.textContent = `Downloading ${name} (${done+1}/${entries.length})...`;
    await downloadOne(url, name);
    done++;
    await new Promise(r => setTimeout(r, 500)); // small delay between downloads
  }
  status.textContent = `Done! Downloaded ${done} logos. Check your Downloads folder.`;
}
</script>
</body>
</html>
